services:
  - type: web
    name: finlens-api
    runtime: docker
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: OLLAMA_BASE_URL
        value: ""
      - key: CHROMA_PATH
        value: ./chroma_db
      - key: COLLECTION_NAME
        value: bank_statements
      - key: CHUNK_SIZE
        value: "1500"
      - key: CHUNK_OVERLAP
        value: "200"
      - key: TOP_K
        value: "5"