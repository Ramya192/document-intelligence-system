app = 'finlens-api'
primary_region = 'bom'

[build]

[env]
  LLM_PROVIDER = "openai"
  OPENAI_MODEL = "gpt-4o-mini"
  EMBEDDING_MODEL = "text-embedding-3-small"
  CHROMA_PATH = "/data/chroma_db"
  COLLECTION_NAME = "bank_statements"
  CHUNK_SIZE = "1500"
  CHUNK_OVERLAP = "200"
  TOP_K = "5"
  OLLAMA_BASE_URL = ""
  HF_HUB_DISABLE_PROGRESS_BARS = "1"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source = "finlens_chroma_data"
  destination = "/data"
